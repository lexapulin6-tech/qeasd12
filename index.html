<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #0f1115; color: white; margin: 0; padding: 15px; -webkit-user-select: none; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #f39c12; font-size: 22px; margin: 0; text-transform: uppercase; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 160px; }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; padding: 15px; text-align: center; transition: 0.2s;
        }
        
        .card.selected { 
            border-color: #f39c12; background: rgba(243, 156, 18, 0.15); 
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.2); 
        }

        .card b { display: block; font-size: 18px; margin-bottom: 5px; }
        .card span { color: #f39c12; font-weight: bold; }

        .footer { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #16191f; padding: 15px; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); z-index: 100; 
        }
        
        input { 
            width: 100%; padding: 12px; border-radius: 10px; 
            border: 1px solid #333; background: #000; color: #fff; 
            margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 16px;
        }

        button { 
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: #f39c12; color: #000; font-weight: bold; 
            font-size: 16px; opacity: 0.4; transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PUBG UC SHOP</h1>
        <p style="color: #888; font-size: 12px; margin-top: 5px;">Выберите пакет и введите свой ID</p>
    </div>

    <div class="grid" id="container"></div>

    <div class="footer">
        <input type="number" id="p_id" placeholder="Ваш Player ID">
        <button id="main_btn" disabled>ОФОРМИТЬ ЗАКАЗ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ПОЛНЫЙ ПРАЙС-ЛИСТ (из твоего списка)
        const prices = {
            "60": 90, "120": 170, "180": 250, "240": 325, "325": 420, "385": 490, "445": 570, "660": 810, "720": 890, 
            "985": 1200, "1320": 1600, "1800": 2050, "1920": 2200, "2125": 2425, "2460": 2815, "3850": 3950, 
            "4510": 4750, "5650": 6000, "8100": 7900, "9900": 10000, "11950": 11850, "16200": 15800, 
            "24300": 23850, "32400": 31650, "40500": 39500, "81000": 77000
        };

        let selected = null;
        const container = document.getElementById('container');
        const btn = document.getElementById('main_btn');
        const input = document.getElementById('p_id');

        function validate() {
            if (selected && input.value.trim().length >= 5) {
                btn.disabled = false;
                btn.style.opacity = "1";
            } else {
                btn.disabled = true;
                btn.style.opacity = "0.4";
            }
        }

        // Отрисовка всех карточек из списка цен
        for (let uc in prices) {
            const price = prices[uc];
            const item = document.createElement('div');
            item.className = 'card';
            item.innerHTML = `<b>💎 ${uc} UC</b> <span>${price}₽</span>`;
            
            item.onclick = () => {
                document.querySelectorAll('.card').forEach(el => el.classList.remove('selected'));
                item.classList.add('selected');
                selected = { uc: uc, price: price };
                validate();
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            };
            container.appendChild(item);
        }

        input.addEventListener('input', validate);

        btn.onclick = () => {
            if (!selected || input.value.length < 5) return;
            
            const payload = {
                amount: selected.uc,
                price: selected.price,
                player_id: input.value
            };
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify(payload));
        };
    </script>
</body>
</html>
