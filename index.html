<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 120px; }
        .card { 
            background: #1e1e1e; border: 1px solid #333; padding: 15px; 
            border-radius: 12px; width: 40%; cursor: pointer; 
        }
        .card.active { border-color: #f39c12; background: rgba(243,156,18,0.1); }
        .card b { display: block; font-size: 18px; }
        .card span { color: #f39c12; font-weight: bold; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #121212; padding: 15px; border-top: 1px solid #333; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }
        button { width: 95%; background: #f39c12; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; opacity: 0.3; }
    </style>
</head>
<body>

    <h2>PUBG UC SHOP</h2>
    <div class="grid" id="cont"></div>

    <div class="footer">
        <input type="number" id="uid" placeholder="Введите Player ID">
        <button id="btn" disabled>ОФОРМИТЬ ЗАКАЗ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Упрощенный список для теста (если заработает - добавим остальные)
        const items = [
            {uc: "60", p: 90}, {uc: "120", p: 170}, {uc: "180", p: 250}, {uc: "240", p: 325},
            {uc: "325", p: 420}, {uc: "660", p: 810}, {uc: "1320", p: 1600}, {uc: "1800", p: 2050}
        ];

        let sel = null;
        const cont = document.getElementById('cont');
        const btn = document.getElementById('btn');
        const uid = document.getElementById('uid');

        function check() {
            if (sel && uid.value.length >= 5) {
                btn.disabled = false; btn.style.opacity = "1";
            } else {
                btn.disabled = true; btn.style.opacity = "0.3";
            }
        }

        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<b>${item.uc} UC</b><span>${item.p}₽</span>`;
            div.onclick = () => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                div.classList.add('active');
                sel = item;
                check();
            };
            cont.appendChild(div);
        });

        uid.oninput = check;
        btn.onclick = () => {
            tg.sendData(JSON.stringify({amount: sel.uc, price: sel.p, player_id: uid.value}));
        };
    </script>
</body>
</html>
